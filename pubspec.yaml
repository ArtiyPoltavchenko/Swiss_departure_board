name: swiss_departure_board
description: Real-time departure board for Swiss public transport stops.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  dio: ^5.4.0
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  shared_preferences: ^2.2.0
  home_widget: ^0.6.0
  workmanager: ^0.5.0
  intl: ^0.19.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0
  mockito: ^5.4.0
  build_verify: ^3.0.0
  flutter_launcher_icons: ^0.13.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icon/
