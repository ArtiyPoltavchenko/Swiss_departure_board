name: swiss_departure_board
description: Real-time departure board for Swiss public transport stops.
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  dio: ^5.4.0
  flutter_riverpod: ^2.5.0
  # riverpod_annotation removed: app uses manual Riverpod providers,
  # not @riverpod code generation. Fixed: was incorrectly in runtime deps.
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  shared_preferences: ^2.2.0
  home_widget: ^0.6.0
  workmanager: ^0.6.0
  intl: ^0.19.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # riverpod_generator and build_runner removed: no @riverpod annotations in
  # codebase, so code generation is unused. Fixed: prevented pub get warnings.
  mockito: ^5.4.0
  flutter_launcher_icons: ^0.13.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icon/
